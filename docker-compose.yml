version: "3.9"

networks:
  frontend_net:
    driver: bridge
  inference_net:
    driver: bridge
    internal: true   # No internet egress — vLLM air-gapped

services:
  postgres:
    image: postgres:16-alpine
    networks:
      - frontend_net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shieldlayer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
      POSTGRES_DB: ${POSTGRES_DB:-shieldlayer}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shieldlayer"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  vllm:
    image: vllm/vllm-openai:latest
    networks:
      - inference_net    # inference_net only — no frontend_net
    command: ["--model", "${VLLM_MODEL}", "--served-model-name", "${VLLM_MODEL}"]
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  app:
    build: .
    env_file: .env
    ports:
      - "8080:8000"
    networks:
      - frontend_net
      - inference_net
    depends_on:
      postgres:
        condition: service_healthy
      vllm:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    networks:
      - frontend_net
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  pgdata:
