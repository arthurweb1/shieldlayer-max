version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --save "" --appendonly no   # RAM-only, no disk

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [redis]
    environment:
      - REDIS_URL=redis://redis:6379/0

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:8000
