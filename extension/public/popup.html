<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #09090b;
      color: #e4e4e7;
      margin: 0;
    }
    h1 { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
    p { font-size: 11px; color: #71717a; margin: 0 0 16px; }
    .status { font-size: 12px; padding: 8px 12px; border-radius: 6px; background: #18181b; margin-bottom: 12px; }
    .status.active { border: 1px solid #3b82f6; color: #60a5fa; }
    .status.inactive { border: 1px solid #3f3f46; color: #71717a; }
    label { font-size: 11px; color: #71717a; display: block; margin-bottom: 4px; }
    input {
      width: 100%;
      box-sizing: border-box;
      background: #18181b;
      border: 1px solid #3f3f46;
      color: #e4e4e7;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 11px;
    }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: #3b82f6;
      color: #fff;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <h1>ShieldLayer Ghost Mode</h1>
  <p>EU AI Act compliance proxy</p>

  <div id="status" class="status inactive">Ghost Mode: OFF</div>

  <label>Gateway URL</label>
  <input type="text" id="gateway" value="http://localhost:8000" />

  <button id="toggle">Toggle Ghost Mode</button>

  <script>
    const statusEl = document.getElementById("status");
    const gatewayEl = document.getElementById("gateway");
    const toggleBtn = document.getElementById("toggle");

    chrome.storage.local.get(["ghostMode", "shieldlayerGatewayUrl"], (result) => {
      updateStatus(!!result.ghostMode);
      if (result.shieldlayerGatewayUrl) gatewayEl.value = result.shieldlayerGatewayUrl;
    });

    function updateStatus(active) {
      statusEl.textContent = `Ghost Mode: ${active ? "ON" : "OFF"}`;
      statusEl.className = `status ${active ? "active" : "inactive"}`;
    }

    toggleBtn.addEventListener("click", () => {
      chrome.storage.local.get(["ghostMode"], (result) => {
        const newState = !result.ghostMode;
        chrome.storage.local.set({ ghostMode: newState });
        updateStatus(newState);
      });
    });

    gatewayEl.addEventListener("change", () => {
      chrome.storage.local.set({ shieldlayerGatewayUrl: gatewayEl.value });
    });
  </script>
</body>
</html>
